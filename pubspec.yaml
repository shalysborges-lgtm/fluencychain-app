name: fluencychain
description: "Inglês corporativo gamificado para Logística, Supply Chain e BI"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  supabase_flutter: ^2.5.6
  record: ^5.1.0
  just_audio: ^0.9.40
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # Assets e fontes (Space Grotesk, Inter, IBM Plex Mono — Etapa 10)
  # entram aqui assim que os arquivos .ttf forem adicionados em assets/fonts/.
