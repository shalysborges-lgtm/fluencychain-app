name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Gerar scaffolding nativo (android/, ios/) se ainda não existir
        run: flutter create --platforms=android --org com.fluencychain --project-name fluencychain_app .

      - name: Remover arquivo de teste padrão gerado automaticamente
        run: rm -f test/widget_test.dart

      - name: Analisar código (lint)
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Rodar testes de unidade
        run: flutter test
        continue-on-error: true

      - name: Compilar APK (release, não assinado)
        run: flutter build apk --release

      - name: Publicar o APK como artefato do workflow
        uses: actions/upload-artifact@v4
        with:
          name: fluencychain-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
